<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RSVP Form</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 20px; }
        .container { max-width: 600px; margin: auto; }
        label { display: block; margin-bottom: 5px; }
        input, textarea { width: 100%; padding: 8px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 10px 15px; background-color: #4CAF50; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:disabled { background-color: #ccc; }
        .success { color: green; }
        .loading { color: orange; }
    </style>
</head>
<body>
    <div class="container">
        <h1>RSVP for Sophia</h1>
        <form id="rsvp-form">
            <label for="guest-name">Parent/Guest Name:</label>
            <input type="text" id="guest-name" name="guest-name" required>
            
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required>
            
            <label for="phone">Phone:</label>
            <input type="tel" id="phone" name="phone" required>
            
            <label>Attending:</label>
            <input type="radio" id="attending-yes" name="attending" value="yes" required> Yes
            <input type="radio" id="attending-no" name="attending" value="no" required> No
            
            <div id="number-of-adults-container">
                <label for="number-of-adults">Number of Adults:</label>
                <input type="number" id="number-of-adults" name="number-of-adults" min="0" required>
            </div>
            
            <div id="number-of-children-container">
                <label for="number-of-children">Number of Children:</label>
                <input type="number" id="number-of-children" name="number-of-children" min="0" required>
            </div>
            
            <label for="dietary-notes">Dietary Notes:</label>
            <textarea id="dietary-notes" name="dietary-notes"></textarea>
            
            <label for="message">Message for Sophia:</label>
            <textarea id="message" name="message" required></textarea>
            
            <button type="submit" id="submit-btn">Submit</button>
            <p id="response-message"></p>
        </form>
    </div>

    <script>
        const form = document.getElementById('rsvp-form');
        const submitBtn = document.getElementById('submit-btn');
        const responseMessage = document.getElementById('response-message');

        form.addEventListener('submit', function (event) {
            event.preventDefault();
            responseMessage.textContent = '';
            submitBtn.disabled = true;
            submitBtn.textContent = 'Loading...';

            // Simulating form submission delay
            setTimeout(() => {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Submit';
                responseMessage.textContent = 'RSVP submitted successfully!';
                responseMessage.classList.add('success');
            }, 2000);
        });
    </script>
</body>
</html>
