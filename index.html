<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RSVP for Sophia</title>
  <style>
    :root {
      --bg: #f6f7fb;
      --panel: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --border: #d1d5db;
      --accent: #2563eb;
      --accent-hover: #1d4ed8;
      --success: #15803d;
      --error: #b91c1c;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 24px;
    }

    .wrap {
      max-width: 760px;
      margin: 0 auto;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 28px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.05);
    }

    h1 {
      margin: 0 0 8px;
      font-size: 2rem;
    }

    .sub {
      margin: 0 0 24px;
      color: var(--muted);
      line-height: 1.5;
    }

    form {
      display: grid;
      gap: 18px;
    }

    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    @media (max-width: 680px) {
      .grid-2 {
        grid-template-columns: 1fr;
      }
    }

    .field {
      display: grid;
      gap: 8px;
    }

    label {
      font-weight: 700;
    }

    input,
    textarea {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid var(--border);
      border-radius: 10px;
      font: inherit;
      color: var(--text);
      background: #fff;
    }

    textarea {
      min-height: 120px;
      resize: vertical;
    }

    input:focus,
    textarea:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
    }

    fieldset {
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 16px;
      margin: 0;
    }

    legend {
      font-weight: 700;
      padding: 0 6px;
    }

    .radio-row {
      display: flex;
      gap: 18px;
      flex-wrap: wrap;
    }

    .radio-option {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-weight: 400;
    }

    .radio-option input {
      width: auto;
      margin: 0;
    }

    .helper {
      color: var(--muted);
      font-size: 0.95rem;
    }

    .hidden {
      display: none !important;
    }

    .actions {
      display: flex;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
    }

    button {
      border: none;
      border-radius: 10px;
      padding: 12px 18px;
      background: var(--accent);
      color: white;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
    }

    button:hover:enabled {
      background: var(--accent-hover);
    }

    button:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    .status {
      min-height: 1.2em;
      margin: 0;
      font-weight: 700;
    }

    .status.success { color: var(--success); }
    .status.error { color: var(--error); }

    .hp {
      position: absolute;
      left: -9999px;
      width: 1px;
      height: 1px;
      overflow: hidden;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>RSVP for Sophia</h1>
      <p class="sub">
        Please submit one RSVP per family. Fields for adults, children, and dietary notes only appear if you’re attending.
      </p>

      <form id="rsvpForm" novalidate>
        <div class="grid-2">
          <div class="field">
            <label for="guestName">Parent / Guest Name</label>
            <input id="guestName" name="guestName" type="text" required />
          </div>

          <div class="field">
            <label for="phone">Phone</label>
            <input id="phone" name="phone" type="tel" required />
          </div>
        </div>

        <div class="field">
          <label for="email">Email</label>
          <input id="email" name="email" type="email" required />
        </div>

        <fieldset>
          <legend>Attending</legend>
          <div class="radio-row">
            <label class="radio-option" for="attendingYes">
              <input id="attendingYes" name="attending" type="radio" value="yes" required />
              Yes, we will attend
            </label>

            <label class="radio-option" for="attendingNo">
              <input id="attendingNo" name="attending" type="radio" value="no" required />
              No, we cannot attend
            </label>
          </div>
        </fieldset>

        <div id="attendanceDetails" class="hidden">
          <div class="grid-2">
            <div class="field">
              <label for="numberOfAdults">Number of Adults</label>
              <input id="numberOfAdults" name="numberOfAdults" type="number" min="0" value="1" />
            </div>

            <div class="field">
              <label for="numberOfChildren">Number of Children</label>
              <input id="numberOfChildren" name="numberOfChildren" type="number" min="0" value="0" />
            </div>
          </div>

          <div class="field">
            <label for="dietaryNotes">Dietary Notes</label>
            <textarea id="dietaryNotes" name="dietaryNotes" placeholder="Optional"></textarea>
            <div class="helper">List allergies, restrictions, or preferences if needed.</div>
          </div>
        </div>

        <div class="field">
          <label for="message">Message for Sophia</label>
          <textarea id="message" name="message" required></textarea>
        </div>

        <!-- Honeypot -->
        <div class="hp" aria-hidden="true">
          <label for="website">Website</label>
          <input id="website" name="website" type="text" tabindex="-1" autocomplete="off" />
        </div>

        <div class="actions">
          <button id="submitBtn" type="submit">Submit RSVP</button>
          <p id="statusMessage" class="status" aria-live="polite"></p>
        </div>
      </form>
    </div>
  </div>

  <script>
    const form = document.getElementById("rsvpForm");
    const attendingYes = document.getElementById("attendingYes");
    const attendingNo = document.getElementById("attendingNo");
    const attendanceDetails = document.getElementById("attendanceDetails");
    const adultsInput = document.getElementById("numberOfAdults");
    const childrenInput = document.getElementById("numberOfChildren");
    const dietaryInput = document.getElementById("dietaryNotes");
    const submitBtn = document.getElementById("submitBtn");
    const statusMessage = document.getElementById("statusMessage");

    function updateAttendanceUI() {
      const isAttending = attendingYes.checked;

      attendanceDetails.classList.toggle("hidden", !isAttending);
      adultsInput.required = isAttending;

      if (!isAttending) {
        adultsInput.value = "0";
        childrenInput.value = "0";
        dietaryInput.value = "";
      } else if (!adultsInput.value) {
        adultsInput.value = "1";
      }
    }

    attendingYes.addEventListener("change", updateAttendanceUI);
    attendingNo.addEventListener("change", updateAttendanceUI);

    function setStatus(text, type = "") {
      statusMessage.textContent = text;
      statusMessage.className = "status" + (type ? ` ${type}` : "");
    }

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      setStatus("");

      const attending = form.elements.attending.value;
      const numberOfAdults = attending === "yes" ? Number(adultsInput.value || 0) : 0;
      const numberOfChildren = attending === "yes" ? Number(childrenInput.value || 0) : 0;

      if (!form.reportValidity()) return;

      if (attending === "yes" && (numberOfAdults + numberOfChildren < 1)) {
        setStatus("Please enter at least one attendee.", "error");
        return;
      }

      const payload = {
        guestName: form.guestName.value.trim(),
        email: form.email.value.trim(),
        phone: form.phone.value.trim(),
        attending,
        numberOfAdults,
        numberOfChildren,
        dietaryNotes: attending === "yes" ? form.dietaryNotes.value.trim() : "",
        message: form.message.value.trim(),
        website: form.website.value.trim()
      };

      try {
        submitBtn.disabled = true;
        submitBtn.textContent = "Submitting...";
        setStatus("Sending RSVP...");

        const response = await fetch("/api/rsvp", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify(payload)
        });

        const result = await response.json();

        if (!response.ok) {
          throw new Error(result.error || "Submission failed.");
        }

        setStatus(result.message || "RSVP submitted successfully.", "success");
        form.reset();
        adultsInput.value = "1";
        childrenInput.value = "0";
        updateAttendanceUI();
      } catch (error) {
        setStatus(error.message || "An unexpected error occurred.", "error");
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = "Submit RSVP";
      }
    });

    updateAttendanceUI();
  </script>
</body>
</html>
