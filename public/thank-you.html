<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thank You for Your RSVP</title>
  <style>
    body {
      margin: 0;
      font-family: "Trebuchet MS", "Segoe UI", Arial, sans-serif;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at top left, #ffe7f4 0%, transparent 30%),
        radial-gradient(circle at top right, #fff3c9 0%, transparent 24%),
        linear-gradient(180deg, #fff8fc 0%, #fff0f8 100%);
      color: #5f3553;
      padding: 20px;
      box-sizing: border-box;
    }

    .card {
      width: min(680px, 100%);
      background: rgba(255, 255, 255, 0.96);
      border-radius: 28px;
      padding: 36px 28px;
      box-shadow: 0 18px 45px rgba(230, 73, 149, 0.16);
      text-align: center;
    }

    h1 {
      margin: 0 0 14px;
      color: #e64995;
      font-size: clamp(2rem, 5vw, 3rem);
    }

    p {
      margin: 0 0 14px;
      line-height: 1.65;
      font-size: 1.05rem;
    }

    a {
      display: inline-block;
      margin-top: 12px;
      text-decoration: none;
      padding: 12px 20px;
      border-radius: 999px;
      background: linear-gradient(135deg, #ff6fb3, #e64995);
      color: white;
      font-weight: 800;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Thank You!</h1>
    <p>Your RSVP has been received successfully.</p>
    <p>We appreciate your response and look forward to celebrating Sophia’s special day with you.</p>
    <a href="/">Back to Invitation</a>
  </div>
</body>
</html>
