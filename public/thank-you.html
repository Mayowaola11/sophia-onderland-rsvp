<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thank You | Sophia is ONE</title>
  <style>
    :root {
      --pink-1: #fff4fa;
      --pink-2: #ffe1f0;
      --pink-3: #ff6fb3;
      --pink-4: #e64995;
      --gold: #ffd86b;
      --text: #5f3553;
      --muted: #8d6780;
      --shadow: 0 18px 45px rgba(230, 73, 149, 0.16);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 20px;
      font-family: "Trebuchet MS", "Segoe UI", Arial, sans-serif;
      background:
        radial-gradient(circle at top left, #ffe7f4 0%, transparent 30%),
        radial-gradient(circle at top right, #fff3c9 0%, transparent 24%),
        linear-gradient(180deg, #fff8fc 0%, #fff0f8 100%);
      color: var(--text);
    }

    .card {
      max-width: 760px;
      width: 100%;
      text-align: center;
      background: rgba(255, 255, 255, 0.95);
      border-radius: 32px;
      padding: 44px 28px;
      box-shadow: var(--shadow);
      border: 2px solid rgba(255, 255, 255, 0.85);
    }

    .icon {
      width: 100px;
      height: 100px;
      margin: 0 auto 18px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      font-size: 42px;
      background: linear-gradient(135deg, #ffd9ec, #fff3c4);
      color: var(--pink-4);
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(2rem, 4vw, 3rem);
      color: var(--pink-4);
    }

    p {
      margin: 0 0 14px;
      font-size: 1.08rem;
      line-height: 1.65;
      color: var(--muted);
    }

    .lead {
      font-size: 1.2rem;
      font-weight: 800;
      color: var(--text);
    }

    .btn {
      display: inline-block;
      margin-top: 18px;
      text-decoration: none;
      padding: 14px 22px;
      border-radius: 999px;
      background: linear-gradient(135deg, var(--pink-3), var(--pink-4));
      color: white;
      font-weight: 800;
      box-shadow: 0 12px 25px rgba(230, 73, 149, 0.22);
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">🎀</div>
    <h1>Thank You!</h1>
    <p class="lead">Your seat is reserved.</p>
    <p>
      We are so excited to celebrate Sophia’s first birthday with you.
      If your plans change, please submit another RSVP or reach out to us directly.
    </p>
    <p>
      Event date: <strong>July 4, 2026</strong><br />
      Time: <strong>1:00 PM</strong><br />
      Location: <strong>Seattle</strong>
    </p>
    <a class="btn" href="/">Back to Invitation</a>
  </div>
</body>
</html>
